spring.application.name=paciente

server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3307/db_paciente
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.docker.compose.enabled=false

# 1. Define el nombre y la ruta del archivo de logs (relativa a la raíz del proyecto)
logging.file.name=logs/app-dev.json
# 2. Activa el formato JSON estructurado nativo para el archivo
logging.structured.format.file=logstash
# 3. (Opcional) Si también quieres que la consola de tu IDE muestre JSON
logging.structured.format.console=logstash

